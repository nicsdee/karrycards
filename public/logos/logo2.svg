      y="116"
      fill="url(#karry-logo-fill)"
      stroke="#fff8ef"
      stroke-linejoin="round"
      stroke-width="4"
      font-family="Arial Black, Impact, Arial, Helvetica, sans-serif"
      font-size="112"
      font-style="italic"
      font-weight="900"
      paint-order="stroke fill"
    >KarryCards</text>
    <text
      x="122"
      y="169"
      fill="url(#karry-tag-fill)"
      font-family="Arial Black, Arial, Helvetica, sans-serif"
      font-size="25"
      font-weight="900"
      letter-spacing="8"
    >GIFT CARDS YOU CAN TRUST</text>
    <path d="M128 184H830" stroke="#ff7a1a" stroke-linecap="round" stroke-width="5" opacity=".9" />
    <path d="M128 194H650" stroke="#52b788" stroke-linecap="round" stroke-width="4" opacity=".9" />
  </g>
