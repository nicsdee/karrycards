<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 210" role="img" aria-labelledby="logo2-title logo2-desc">
  <title id="logo2-title">KarryCards</title>
  <desc id="logo2-desc">Green and orange KarryCards logo</desc>
  <defs>
    <linearGradient id="karry-logo-fill" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#16a36d" />
      <stop offset="0.48" stop-color="#52b788" />
      <stop offset="1" stop-color="#ff7a1a" />
    </linearGradient>
    <linearGradient id="karry-tag-fill" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#fff7ed" />
      <stop offset="1" stop-color="#dff8ea" />
    </linearGradient>
  </defs>
  <g fill="none">
    <text
